<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vivero Verde | Tienda de Plantas y Semillas</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
<div class="logo-container">
    <img src="https://u.cubeupload.com/LAUIS46/ca2logo.png" alt="Logo Vivero EcoMagia"">
</div>
        <div class="user-controls">
            <button id="cartBtn" class="nav-btn">🛒 Carrito (<span id="cartCount">0</span>)</button>
            
            <div id="userMenu">
                <button id="loginBtn" class="nav-btn">Ingresar / Registro</button>
                <div id="userProfileBadge" class="hidden">
                    <img src="https://via.placeholder.com/40" alt="Perfil" id="userAvatarBtn">
                    <span id="userNameDisplay">Usuario</span>
                    <button id="logoutBtn" class="nav-btn nav-btn-small">Salir</button>
                </div>
            </div>

            <button id="settingsBtn" class="nav-btn">⚙️ Ajustes</button>
        </div>
    </header>

    <main>
        <section id="adminPanel" class="hidden">
            <h2>Panel de Administrador 👑</h2>
            <form id="addProductForm">
                <div class="form-grid">
                    <input type="text" id="prodName" placeholder="Nombre del producto" required>
                    <input type="number" id="prodOldPrice" placeholder="Precio Original ($)" required>
                    <input type="number" id="prodNewPrice" placeholder="Precio de Oferta ($) - Opcional">
                    <input type="number" id="prodStock" placeholder="Stock disponible" required>
                </div>
                <textarea id="prodDesc" placeholder="Descripción" required></textarea>
                <input type="file" id="prodImage" accept="image/*" required>
                <button type="submit" class="action-btn">Agregar Producto</button>
            </form>
        </section>

        <section class="catalog" id="catalog">
            </section>
    </main>

    <div id="authModal" class="modal hidden">
        <div class="modal-content auth-content">
            <div class="auth-tabs">
                <button id="tabLogin" class="active">Iniciar Sesión</button>
                <button id="tabRegister">Registrarse</button>
            </div>
            
            <div id="loginFormArea">
                <input type="email" id="loginEmail" placeholder="Correo Electrónico">
                <input type="password" id="loginPassword" placeholder="Contraseña">
                <button id="submitLogin" class="action-btn">Entrar</button>
            </div>

            <div id="registerFormArea" class="hidden">
                <input type="text" id="regNickname" placeholder="Tu Nickname">
                <input type="email" id="regEmail" placeholder="Correo Electrónico">
                <input type="password" id="regPassword" placeholder="Contraseña (Mín. 6 caracteres)">
                <button id="submitRegister" class="action-btn">Crear Cuenta</button>
            </div>
            
            <button class="close-modal">Cerrar</button>
        </div>
    </div>

    <div id="settingsModal" class="modal hidden">
        <div class="modal-content">
            <h3>⚙️ Ajustes del Sistema</h3>
            
            <div class="setting-item">
                <label for="darkModeToggle">Modo Oscuro</label>
                <label class="switch">
                    <input type="checkbox" id="darkModeToggle">
                    <span class="slider round"></span>
                </label>
            </div>

            <hr>

            <div id="editProfileArea" class="hidden">
                <h3>✏️ Editar Perfil</h3>
                <input type="text" id="editNickname" placeholder="Nuevo Nickname">
                <input type="url" id="editAvatarUrl" placeholder="URL de tu nueva foto de perfil">
                <button id="saveProfileBtn" class="action-btn">Guardar Cambios</button>
            </div>
            
            <p id="settingsLoginPrompt" class="text-muted">Inicia sesión para editar tu perfil.</p>
            
            <button class="close-modal mt-2">Cerrar</button>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
