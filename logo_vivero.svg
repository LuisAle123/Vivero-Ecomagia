```

### ¿Cómo integrarlo a tu página?

1.  **Guarda el archivo:** Crea un archivo llamado `logo.svg` en la carpeta donde tienes tu `index.html`.
2.  **Actualiza el HTML:** En tu archivo `index.html`, busca la sección del logo y cámbiala por la ruta de este nuevo archivo:

```html
<!-- Busca esta parte en tu index.html -->
<div class="logo-container">
    <img src="logo.svg" alt="Logo Vivero EcoMagia" id="main-logo">
</div>